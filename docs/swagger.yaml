host: localhost:8080
info:
  contact: {}
  description: TMS integration service — proxies freight load operations to the Turvo
    external API.
  title: Drumkit Integration API
  version: "1.0"
paths:
  /integrations/webhooks/loads:
    post:
      consumes:
      - application/json
      description: Receives a freight load payload and creates it in Turvo.
      parameters:
      - description: Load payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CreateLoadRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.CreateLoadResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a load via webhook
      tags:
      - loads
  /loads:
    get:
      description: Returns all freight loads synced from Turvo.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.LoadResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List all loads
      tags:
      - loads
schemes:
- http
- https
swagger: "2.0"
